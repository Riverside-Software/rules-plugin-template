name: Build package

on:
  push:
    branches: [ TestAction ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Build with Maven
      run: mvn -s github-settings.xml -Dusername=${{ github.actor }} -Dpassword=${{ secrets.GITHUB_TOKEN }} -B -ntp deploy
